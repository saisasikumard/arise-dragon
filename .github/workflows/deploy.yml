name: Build and Deploy to EC2

on:
  push:
    branches:
      - main  # triggers on every push to main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Set up Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Build JAR
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 4. Copy JAR to EC2
      - name: Copy JAR to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          port: ${{ secrets.EC2_PORT }}
          source: "target/*.jar"
          target: "/home/ec2-user/"
          strip_components: 1

      # 5. SSH into EC2 and restart app
      - name: Deploy on EC2
        uses: appleboy/ssh-action@master
        with:
            host: ${{ secrets.EC2_HOST }}
            username: ${{ secrets.EC2_USER }}
            key: ${{ secrets.EC2_KEY }}
            port: ${{ secrets.EC2_PORT }}
            command_timeout: 30s
            script: |
              pkill -f 'arise-0.0.1-SNAPSHOT.jar' || true
              sleep 3
              nohup java -jar /home/ec2-user/arise-0.0.1-SNAPSHOT.jar > /home/ec2-user/app.log 2>&1 &
              APP_PID=$!
              echo "App started with PID $APP_PID"
              disown $APP_PID
              exit 0